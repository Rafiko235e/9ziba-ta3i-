<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>MERIEM ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffc3a0);

}

.card{

position:relative;

width:90%;
max-width:700px;

background:rgba(255,255,255,.92);

padding:45px;

border-radius:35px;

text-align:center;

box-shadow:0 0 45px rgba(255,40,120,.35);

z-index:20;

}

h1{

font-family:'Great Vibes',cursive;

font-size:85px;

color:#ff2f66;

margin-bottom:20px;

}

button{

background:#ff2f66;

color:white;

border:none;

padding:18px 36px;

font-size:20px;

border-radius:50px;

cursor:pointer;

transition:.35s;

position:relative;

}

button:hover{

transform:scale(1.08);

}

#message{

display:none;

animation:show 1.5s;

}

#typewriter{

font-size:18px;

line-height:1.9;

color:#444;

white-space:pre-wrap;

}

.cat{

position:absolute;

background:white;

padding:12px 18px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.18);

font-size:28px;

animation:show .4s;

z-index:100;

}

.heartRain{

position:absolute;

top:-30px;

font-size:24px;

animation:fall linear infinite;

pointer-events:none;

}

@keyframes fall{

to{

transform:translateY(110vh);

}

}

@keyframes show{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

canvas{

position:fixed;

left:0;

top:0;

pointer-events:none;

}

</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card">

<div id="start">

<h1>MERIEM ❤️</h1>

<p style="margin-bottom:25px;font-size:19px;color:#555;">
Someone has a surprise for you...
</p>

<button id="btn" onclick="moveButton(this)">

Click here MERIEM ❤️

</button>

</div>

<div id="message">

<h1>Happy Birthday ❤️</h1>

<div id="typewriter"></div>

</div>

</div>
<script>

let clicks = 0;

const buttonTexts = [
"Click here MERIEM ❤️",
"Catch me 😸",
"Too slow 😹",
"Almost there ❤️",
"One more click 🐾"
];

const catMessages = [
"😸 Catch me!",
"😹 Too slow!",
"🐾 Almost there!",
"😼 One more click!"
];

const message = `My beautiful MERIEM ❤️

I don't know if words will ever be enough to tell you how much you mean to me.

From the moment you became part of my life, everything started feeling brighter. Your smile, your kindness, your beautiful soul... all of it makes my days happier.

Thank you for every laugh, every conversation, every memory, and every little moment we shared.

On your birthday I wish you endless happiness, good health, success, peace, and a future full of beautiful surprises.

Never forget that you are someone very special to me.

Happy Birthday MERIEM ❤️🎂

Forever & Always ❤️

lovvvvveeeeee uuuuuu habibi ta333yyy w7dyyyy ❤️`;

function moveButton(btn){

clicks++;

if(clicks < 5){

btn.innerHTML = buttonTexts[clicks];

btn.style.position="fixed";

btn.style.left=(10+Math.random()*70)+"%";

btn.style.top=(10+Math.random()*70)+"%";

showCat(clicks);

return;

}

startCountdown();

}

function showCat(i){

let cat=document.createElement("div");

cat.className="cat";

cat.innerHTML=catMessages[i-1];

cat.style.left=(i%2==0?"8%":"72%");

cat.style.top=(18+i*10)+"%";

document.body.appendChild(cat);

setTimeout(()=>{

cat.remove();

},1800);

}

function startCountdown(){

document.getElementById("start").innerHTML=

"<h1>Ready...? ❤️</h1><h1 id='count'>3</h1>";

let n=3;

let t=setInterval(()=>{

n--;

document.getElementById("count").innerHTML=n;

if(n==0){

clearInterval(t);

openMessage();

}

},1000);

}

function openMessage(){

document.getElementById("start").style.display="none";

document.getElementById("message").style.display="block";

typeMessage();

}function typeMessage(){

let i=0;

const target=document.getElementById("typewriter");

const timer=setInterval(()=>{

target.innerHTML+=message.charAt(i);

i++;

if(i>=message.length){

clearInterval(timer);

}

},25);

}



for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.className="heartRain";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=(4+Math.random()*5)+"s";

heart.style.animationDelay=Math.random()*5+"s";

heart.style.fontSize=(18+Math.random()*20)+"px";

document.body.appendChild(heart);

}



const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

window.onresize=()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

};

let particles=[];

function explode(){

for(let i=0;i<220;i++){

particles.push({

x:canvas.width/2,

y:canvas.height/2,

vx:(Math.random()-0.5)*12,

vy:(Math.random()-0.5)*12,

life:100,

color:`hsl(${Math.random()*360},100%,60%)`

});

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=particles.length-1;i>=0;i--){

let p=particles[i];

p.x+=p.vx;

p.y+=p.vy;

p.vy+=0.05;

p.life--;

ctx.fillStyle=p.color;

ctx.beginPath();

ctx.arc(p.x,p.y,2,0,Math.PI*2);

ctx.fill();

if(p.life<=0){

particles.splice(i,1);

}

}

requestAnimationFrame(animate);

}

animate();

const oldOpenMessage=openMessage;

openMessage=function(){

explode();

oldOpenMessage();

};/* إطلاق عدة ألعاب نارية */

let fireworkRounds = 0;

const fireTimer = setInterval(() => {

    explode();

    fireworkRounds++;

    if (fireworkRounds >= 8) {

        clearInterval(fireTimer);

    }

}, 700);



/* نجوم بالخلفية */

for(let i=0;i<120;i++){

    let star=document.createElement("div");

    star.style.position="fixed";

    star.style.width="2px";

    star.style.height="2px";

    star.style.background="white";

    star.style.borderRadius="50%";

    star.style.left=Math.random()*100+"%";

    star.style.top=Math.random()*100+"%";

    star.style.opacity=Math.random();

    star.style.animation="show "+(2+Math.random()*3)+"s infinite alternate";

    document.body.appendChild(star);

}

</script>

</body>

</html>
